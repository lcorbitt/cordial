name: Promote Develop

on:
  # Automatically promote after CI succeeds on a push to develop.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [develop]
  # Manual rerun when needed.
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "promote" to merge develop into main'
        required: true
        type: string

concurrency:
  group: promote-develop
  cancel-in-progress: false

env:
  APP_ENV: development
  NEXT_PUBLIC_APP_ENV: development
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
  SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
  EMAIL_PROVIDER: resend
  JOB_PROVIDER: inngest
  ANALYTICS_PROVIDER: none
  POSTHOG_HOST: https://us.i.posthog.com
  NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com

jobs:
  gate:
    name: Check Trigger
    runs-on: ubuntu-latest
    steps:
      - name: Validate automatic promotion
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "CI did not succeed. Skipping promotion."
            exit 1
          fi
          if [ "${{ github.event.workflow_run.event }}" != "push" ]; then
            echo "Only pushes to develop are promoted automatically."
            exit 1
          fi

      - name: Validate manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "promote" ]; then
            echo '::error::Confirmation must be exactly "promote".'
            exit 1
          fi

  validate-branches:
    name: Validate Branch State
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      should_promote: ${{ steps.check.outputs.should_promote }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure develop can be promoted
        id: check
        run: |
          git fetch origin main develop

          if ! git rev-parse --verify origin/develop >/dev/null 2>&1; then
            echo '::error::origin/develop does not exist.'
            exit 1
          fi

          if [ "$(git rev-parse origin/develop)" = "$(git rev-parse origin/main)" ]; then
            echo "develop and main are in sync. Nothing to promote."
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git merge-base --is-ancestor origin/main origin/develop; then
            echo '::error::main has commits not in develop. Merge main into develop first.'
            exit 1
          fi

          echo "Promoting $(git rev-parse --short origin/develop) onto main."
          echo "should_promote=true" >> "$GITHUB_OUTPUT"

  verify-develop:
    name: Lint, Typecheck, Test, Build (develop)
    needs: validate-branches
    if: github.event_name == 'workflow_dispatch' && needs.validate-branches.outputs.should_promote == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e-develop:
    name: End-to-End + Accessibility (develop)
    needs: validate-branches
    if: github.event_name == 'workflow_dispatch' && needs.validate-branches.outputs.should_promote == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-promote
          path: playwright-report/
          retention-days: 7

  promote:
    name: Merge Develop Into Main
    needs: [validate-branches, verify-develop, e2e-develop]
    if: |
      always() &&
      needs.validate-branches.result == 'success' &&
      needs.validate-branches.outputs.should_promote == 'true' &&
      (
        github.event_name == 'workflow_run' ||
        (
          github.event_name == 'workflow_dispatch' &&
          needs.verify-develop.result == 'success' &&
          needs.e2e-develop.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROMOTE_GITHUB_TOKEN || github.token }}

      - name: Merge develop into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main develop
          git checkout main
          git pull --ff-only origin main
          git merge origin/develop --no-ff -m "Promote develop to main"
          git push origin main

      - name: Summary
        run: |
          echo "Promoted develop ($(git rev-parse --short origin/develop)) to main."
          echo "Production deploy will run via CI on the main push."
