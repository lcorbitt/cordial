name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    concurrency:
      group: verify-${{ github.ref }}
      cancel-in-progress: true
    env:
      # Non-secret placeholders so env validation and the build pass in CI.
      APP_ENV: development
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
      EMAIL_PROVIDER: resend
      JOB_PROVIDER: inngest
      ANALYTICS_PROVIDER: none
      POSTHOG_HOST: https://us.i.posthog.com
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: End-to-end + accessibility
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true
    env:
      APP_ENV: development
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
      EMAIL_PROVIDER: resend
      JOB_PROVIDER: inngest
      ANALYTICS_PROVIDER: none
      POSTHOG_HOST: https://us.i.posthog.com
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-edge-functions:
    name: Deploy Supabase Edge Functions
    needs: verify
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-edge-${{ github.ref }}
      cancel-in-progress: false
    # Only deploy functions on push to main (production); previews use the
    # shared functions for now.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"

  deploy-vercel:
    name: Deploy to Vercel
    needs: verify
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vercel-${{ github.ref }}
      cancel-in-progress: false
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        if: github.event_name == 'pull_request'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        run: vercel deploy --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel environment (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
